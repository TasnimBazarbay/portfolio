<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemoMind • App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="site-container">
        <main class="content-section" style="margin-top: 50px;">
            <div class="glass-panel">
                <a href="index.html" class="back-link">← Back to Portfolio</a>
                
                <h1 class="main-title" style="font-size: 2.2em;">MemoMind Engine</h1>
                <p class="main-text">
                    Transform your chaotic, emotional thoughts into structured, professional business communication.
                </p>
                
                <textarea id="memo-input" class="cyber-input" placeholder="[Input chaotic data...] e.g. Boss, I'm sick with 39 fever..."></textarea>
                <button id="memo-btn" class="action-btn">Synthesize Memo</button>
                <div id="memo-output" class="cyber-output"></div>
            </div>
        </main>
    </div>

    <script>
        const memoBtn = document.getElementById('memo-btn');
        const memoInput = document.getElementById('memo-input');
        const memoOutput = document.getElementById('memo-output');

        memoBtn.addEventListener('click', function() {
            const text = memoInput.value.trim().toLowerCase(); 
            if (text === "") return;

            const today = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

            memoBtn.style.display = 'none'; 
            memoOutput.style.display = 'block';
            memoOutput.innerHTML = "<span style='color:#00ffcc'>> ANALYZING KEYWORDS... SYNTHESIZING LOGIC...</span>";

            setTimeout(() => {
                let to = "[Relevant Stakeholders]";
                let subject = "Urgent Status Update / Action Required";
                let body = "This is an automated synthesis of the provided input. The core issue has been identified and logged. All relevant stakeholders will be informed accordingly.";

                if (text.includes("sick") || text.includes("fever") || text.includes("doctor") || text.includes("ill")) {
                    to = "HR Department / Management";
                    subject = "Notice of Absence Due to Illness";
                    body = "Please be advised that I am currently experiencing health issues and am unable to attend work/meetings today. I will provide a doctor's note upon my return. Please reassign my urgent tasks as necessary.";
                } 
                else if (text.includes("math") || text.includes("prof") || text.includes("class") || text.includes("late") || text.includes("overslept")) {
                    to = "Professor / Course Instructor";
                    subject = "Apology for Tardy Arrival";
                    body = "I am writing to sincerely apologize for missing the beginning of today's lecture due to an unforeseen scheduling failure. I will be present for the remainder of the session and will catch up on all missed materials.";
                } 
                else if (text.includes("server") || text.includes("boss") || text.includes("clients") || text.includes("down")) {
                    to = "IT Support / Management Team";
                    subject = "CRITICAL: Server Outage & Client Impact";
                    body = "We are currently experiencing a critical server outage affecting client operations. Immediate intervention is required to stabilize the system and communicate with affected clients to minimize business impact.";
                }

                memoOutput.innerHTML = `
<span style="color:#00b3ff; font-weight:bold;">TO:</span> ${to}<br>
<span style="color:#00b3ff; font-weight:bold;">FROM:</span> Tasnim<br>
<span style="color:#00b3ff; font-weight:bold;">DATE:</span> ${today}<br>
<span style="color:#00b3ff; font-weight:bold;">SUBJECT:</span> ${subject}<br>
<br>
<span style="color:#00b3ff; font-weight:bold;">BODY:</span><br>
${body}<br><br>
<span style="color:#00ffcc; font-size:0.8em;">> SYSTEM NOTE: Contextual processing complete.</span>
                `;
                memoBtn.style.display = 'inline-block'; 
                memoBtn.innerText = "Synthesize Another Memo";
            }, 1500);
        });
    </script>
</body>
</html>
